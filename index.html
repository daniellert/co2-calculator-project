<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Emissão de CO2</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="header">
        <h1 class="header__title">🌿 Calculadora de emissão de CO2</h1>
        <p class="header__subtitle">
            Informe sua origem, destino e meio de transporte para calcular
            as emissões de CO2 da sua viagem e entender seu impacto ambiental.
        </p>
    </header>

    <main class="main">
        <form id="calculator-form" class="form" novalidate>

            <div class="form__group">
                <label for="origin" class="form__label">Origem</label>
                <input
                    type="text"
                    id="origin"
                    name="origin"
                    class="form__input"
                    list="cities-list"
                    autocomplete="off"
                    placeholder="Digite a cidade de origem"
                    required
                >
            </div>

            <div class="form__group">
                <label for="destination" class="form__label">Destino</label>
                <input
                    type="text"
                    id="destination"
                    name="destination"
                    class="form__input"
                    list="cities-list"
                    autocomplete="off"
                    placeholder="Digite a cidade de destino"
                    required
                >
            </div>

            <datalist id="cities-list"></datalist>

            <div class="form__group">
                <label for="distance" class="form__label">Distância (km)</label>
                <input
                    type="number"
                    id="distance"
                    name="distance"
                    class="form__input form__input--readonly"
                    readonly
                    min="0"
                    placeholder="0"
                >
                <span class="form__helper">A distância será preenchida automaticamente</span>
            </div>

            <div class="form__group form__group--checkbox">
                <label class="form__checkbox-label" for="manual-distance">
                    <input
                        type="checkbox"
                        id="manual-distance"
                        name="manual-distance"
                        class="form__checkbox"
                    >
                    inserir distância manualmente
                </label>
            </div>

            <fieldset class="transport">
                <legend class="transport__legend">Modo de transporte</legend>
                <div class="transport__grid">

                    <label class="transport__option" for="transport-bicycle">
                        <input
                            type="radio"
                            id="transport-bicycle"
                            name="transport"
                            value="bicycle"
                            class="transport__input"
                        >
                        <span class="transport__icon">🚲</span>
                        <span class="transport__text">Bicicleta</span>
                    </label>

                    <label class="transport__option" for="transport-car">
                        <input
                            type="radio"
                            id="transport-car"
                            name="transport"
                            value="car"
                            class="transport__input"
                            checked
                        >
                        <span class="transport__icon">🚗</span>
                        <span class="transport__text">Carro</span>
                    </label>

                    <label class="transport__option" for="transport-bus">
                        <input
                            type="radio"
                            id="transport-bus"
                            name="transport"
                            value="bus"
                            class="transport__input"
                        >
                        <span class="transport__icon">🚌</span>
                        <span class="transport__text">Ônibus</span>
                    </label>

                    <label class="transport__option" for="transport-truck">
                        <input
                            type="radio"
                            id="transport-truck"
                            name="transport"
                            value="truck"
                            class="transport__input"
                        >
                        <span class="transport__icon">🚚</span>
                        <span class="transport__text">Caminhão</span>
                    </label>

                </div>
            </fieldset>

            <button type="submit" class="form__submit">Calcular emissão</button>

        </form>
    </main>

    <section id="results" class="results hidden">
        <div id="results-content" class="results__content"></div>
    </section>

    <section id="comparision" class="comparision hidden">
        <div id="comparision-content" class="comparision__content"></div>
    </section>

    <section id="carbon-credits" class="carbon-credits hidden">
        <div id="carbon-credits-content" class="carbon-credits__content"></div>
    </section>

    <footer class="footer">
        <p class="footer__credits">Desenvolvido para a DIO | Projeto Github Copilot</p>
    </footer>

    <script src="js/routes-data.js"></script>
    <script src="js/config.js"></script>
    <script src="js/calculator.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
